<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Exam Performance Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0b6f5f,#01d2c1);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:35px;
    width:450px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:5px;
}

legend{
    text-align:center;
    color:#555;
    font-size:18px;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:500;
}

select,input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:5px;
    font-size:14px;
}

select:focus,input:focus{
    border-color:#2193b0;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2193b0;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#176c88;
}

.result{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    color:#2193b0;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Student Exam Performance</h1>
<legend>Predict Your Maths Score</legend>

<form action="{{ url_for('predict_datapoint')}}" method="post">

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option selected disabled value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="form-group">
<label>Race or Ethnicity</label>
<select name="race_ethnicity" required>
<option selected disabled value="">Select Ethnicity</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>
</div>

<div class="form-group">
<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
<option selected disabled value="">Select Parent Education</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's Degree</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>
</div>

<div class="form-group">
<label>Lunch Type</label>
<select name="lunch" required>
<option selected disabled value="">Select Lunch Type</option>
<option value="free/reduced">Free/Reduced</option>
<option value="standard">Standard</option>
</select>
</div>

<div class="form-group">
<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
<option selected disabled value="">Select Course</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>
</div>

<div class="form-group">
<label>Writing Score (0-100)</label>
<input type="number" name="writing_score" min="0" max="100" required>
</div>

<div class="form-group">
<label>Reading Score (0-100)</label>
<input type="number" name="reading_score" min="0" max="100" required>
</div>

<button type="submit">🚀 Predict Maths Score</button>

</form>

<div class="result">
{{results}}
</div>

</div>

</body>
</html>
